services:
  - type: web
    name: easyfind-inventory-engine
    runtime: node
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # WhatsApp Cloud API
      - key: WHATSAPP_TOKEN
        sync: false
      - key: PHONE_NUMBER_ID
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      # Google Sheets — service account credentials
      - key: SPREADSHEET_ID
        sync: false
      - key: CLIENT_EMAIL
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: GOOGLE_SHEET_NAME
        sync: false
      # Cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Runtime
      - key: SESSION_SECRET
        sync: false
      - key: NODE_OPTIONS
        sync: false
